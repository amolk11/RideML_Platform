feature_engineering:
  test_size: 0.2
  random_state: 42

mlflow:
  tracking_uri: http://ec2-16-171-45-136.eu-north-1.compute.amazonaws.com:5000
  experiment_name: driver-acceptance-service

model_building:
  learning_rate: 0.01
